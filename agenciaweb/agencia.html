<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agencia</title>
  <style>
    body { font-family: Arial; margin:0; }
    header { display:flex; justify-content:flex-end; gap:10px; padding:10px; background:#111; color:#fff; }
    button { cursor:pointer; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <button id="translateBtn">Traducir</button>
    <button id="adminBtn">Admin</button>
  </header>

  <h1 style="padding:10px;">Paquetes</h1>
  <div id="packages-container"></div>

  <!-- LOGIN -->
  <div id="adminLogin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008;">
    <div style="background:#fff; padding:20px; width:300px; margin:100px auto;">
      <h3>Login Admin</h3>
      <input id="user" placeholder="Usuario"><br><br>
      <input id="pass" type="password" placeholder="Contraseña"><br><br>
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- SIDEBAR ADMIN -->
  <div id="adminPanel" style="position:fixed; right:-320px; top:0; width:300px; height:100%; background:#222; color:#fff; padding:20px; transition:0.3s; overflow:auto;">
    <h3>Admin Panel</h3>

    <input id="title" placeholder="Título"><br><br>
    <input id="price" placeholder="Precio"><br><br>
    <button onclick="addPackage()">Agregar</button>

    <hr>
    <h4>Eliminar paquetes</h4>
    <div id="admin-list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-rqJU8LIZyUajUKzzEkbo67ASlPmH-GQ",
      authDomain: "nuevo-destino-web.firebaseapp.com",
      projectId: "nuevo-destino-web",
      storageBucket: "nuevo-destino-web.firebasestorage.app",
      messagingSenderId: "287208628191",
      appId: "1:287208628191:web:cf99598c33cd1614766e6a",
      measurementId: "G-TP19NYNE9N"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    async function loadPackages() {
      const querySnapshot = await getDocs(collection(db, "packages"));
      const paquetes = [];

      querySnapshot.forEach((docu) => {
        paquetes.push({ id: docu.id, ...docu.data() });
      });

      return paquetes;
    }

    window.addPackage = async function() {
      const title = document.getElementById("title").value;
      const price = document.getElementById("price").value;

      await addDoc(collection(db, "packages"), { title, price });

      alert("Agregado");
      location.reload();
    }

    window.deletePackage = async function(id) {
      await deleteDoc(doc(db, "packages", id));
      location.reload();
    }

    class AgencyPage {
      constructor() {
        this.packages = [];
        this._init();
      }

      async _init() {
        this.packages = await loadPackages();
        this._renderGrid();
        this._renderAdminList();
      }

      _renderGrid() {
        const container = document.querySelector("#packages-container");
        container.innerHTML = this.packages.map(p => `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h3>${p.title}</h3>
            <p>${p.price}</p>
          </div>
        `).join("");
      }

      _renderAdminList() {
        const list = document.getElementById("admin-list");
        list.innerHTML = this.packages.map(p => `
          <div>
            ${p.title}
            <button onclick="deletePackage('${p.id}')">X</button>
          </div>
        `).join("");
      }
    }

    new AgencyPage();

    // LOGIN UI
    document.getElementById("adminBtn").onclick = () => {
      document.getElementById("adminLogin").style.display = "block";
    };

    // 🔐 LOGIN REAL CON FIREBASE
    window.login = async function() {
      const email = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);

        document.getElementById("adminLogin").style.display = "none";
        document.getElementById("adminPanel").style.right = "0";

      } catch (error) {
        alert("Error: " + error.message);
      }
    }

  </script>

</body>
</html>
